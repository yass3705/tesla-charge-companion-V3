<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Mise à jour Tesla</title><style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;width:360px;padding:14px;background:#111;color:#fff}h2{margin:0 0 10px}.box{background:#1d1d20;border:1px solid #333;border-radius:12px;padding:12px;margin:10px 0}button{width:100%;padding:11px;border:0;border-radius:10px;font-weight:700;cursor:pointer}.primary{background:#e82127;color:#fff}.secondary{background:#303036;color:#fff;margin-top:8px}input{width:100%;margin-top:8px}.small{font-size:12px;color:#aaa;line-height:1.4}.good{color:#42d77d}.bad{color:#ff6b6b}.warn{color:#ffc65c}progress{width:100%;margin-top:10px}</style></head><body><h2>⚡ Mise à jour Tesla</h2><div class="box"><b>1. Sélectionne la base actuelle</b><input id="file" type="file" accept=".json,application/json"><div class="small">Choisis <code>data/tesla_stations.json</code>.</div></div><div class="box"><b>2. Lance la mise à jour</b><button id="start" class="primary" disabled>Démarrer</button><button id="stop" class="secondary">Arrêter</button><progress id="progress" value="0" max="100"></progress><div id="status" class="small">En attente du fichier.</div></div><div class="small">Firefox ouvrira une seule fiche Tesla à la fois. À la fin, un nouveau fichier sera téléchargé.</div><script src="popup.js"></script></body></html>
